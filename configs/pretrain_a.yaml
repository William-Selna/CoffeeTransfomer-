# Pretraining run A — baseline: pointwise GELU FFN, full corpus, seed 0.
# A vs B is an ARCHITECTURE comparison at matched seed and matched params:
#   A = GELU FFN (this file), B = gated SwiGLU FFN (pretrain_b.yaml).
# select_and_sweep.py probes both on HTE and forks the winner. Because they
# share a seed, the probe delta is (mostly) the FFN effect — though at ~11M
# params seed noise is non-trivial, so treat a small delta as "signal to chase",
# not a verdict (add more seeds to confirm).
name: pretrain_a

model:
  d_model: 384
  n_heads: 6            # head dim 64
  d_ff: 1536
  prelude_layers: 2
  core_layers: 4
  recurrent: true
  train_r: 4
  randomize_r: true
  r_min: 1
  r_max: 8
  truncated_bptt_k: 4    # "how strong the backprop is" — vary on ONE run to compare
  activation: gelu       # gelu | relu | silu — the other easy variant knob
  pool: cls
  num_bins: 20
  max_position: 256

# Real-run data. For the offline smoke test pass --synthetic (no downloads).
synthetic: false
pubchem_path: data/processed/pubchem.smi         # cleaned, from prepare_corpus.py
pubchem_limit: 10000000                          # full budget ("100")
stage2_reactions_path: data/processed/reactions  # pretokenized mmap, from prepare_corpus.py
tokenizer_path: data/processed/tokenizer.json    # shared vocab (covers HTE molecules)

stage1_enabled: true
stage2_enabled: true
stage1_epochs: 10
stage2_epochs: 5
mlm_prob: 0.15
span_mask_stage2: true

seed: 0
batch_size: 256
lr: 3.0e-4
max_length: 256
device: cuda
amp: true            # bf16 autocast
compile: true        # torch.compile
num_workers: 8
out_dir: runs/pretrain_a
