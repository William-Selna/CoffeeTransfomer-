# Pretraining run B — 10M PubChem molecules.
# Identical to pretrain_5m.yaml except pubchem_limit (and out_dir). "Is 2x the
# Stage-1 corpus worth the extra pretraining compute?" is decided by comparing
# this encoder's linear-probe R² against pretrain_5m's.
name: pretrain_10m

model:
  d_model: 384
  n_heads: 6
  d_ff: 1536
  prelude_layers: 2
  core_layers: 4
  recurrent: true
  train_r: 4
  randomize_r: true
  r_min: 1
  r_max: 8
  truncated_bptt_k: 4
  pool: cls
  num_bins: 20
  max_position: 256

synthetic: false
pubchem_path: data/processed/pubchem.smi
pubchem_limit: 10000000
stage2_reactions_path: data/processed/reactions
tokenizer_path: data/processed/tokenizer.json

stage1_enabled: true
stage2_enabled: true
stage1_epochs: 10
stage2_epochs: 5
mlm_prob: 0.15
span_mask_stage2: true

seed: 0
batch_size: 256
lr: 3.0e-4
max_length: 256
device: cuda
amp: true
compile: true
num_workers: 8
out_dir: runs/pretrain_10m
