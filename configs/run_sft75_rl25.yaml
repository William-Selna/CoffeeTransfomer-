# Run 3 of 4 — SFT 75 / RL 25.
# The design's canonical ~60/20/20 supervised/RL/test structure (Section 7).
name: sft75_rl25

data:
  synthetic: false        # real Buchwald-Hartwig (pass --synthetic to force toy data)
  bh_xlsx: data/hte/Buchwald-Hartwig/Dreher_and_Doyle_input_data.xlsx
  sft_fraction: 0.75
  rl_fraction: 0.25
  test_fraction: 0.20

train:
  device: cuda
  out_dir: runs/sft75_rl25

grpo:
  enabled: true
  reward: tolerance
  tolerance: 10.0
