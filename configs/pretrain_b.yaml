# Pretraining run B — variant: gated SwiGLU FFN, full corpus, seed 0 (matched to A).
# Only `activation` differs from pretrain_a.yaml. SwiGLU is the modern default
# FFN (Llama/PaLM) and is param-matched here: the gated hidden width auto-scales
# to 2/3 * d_ff (1024) so 3*d*1024 == 2*d*1536 == A's FFN params. A smooth gated
# nonlinearity is also the safer choice for the weight-tied core that re-applies
# the same block up to r times.
name: pretrain_b

model:
  d_model: 384
  n_heads: 6
  d_ff: 1536
  prelude_layers: 2
  core_layers: 4
  recurrent: true
  train_r: 4
  randomize_r: true
  r_min: 1
  r_max: 8
  truncated_bptt_k: 4
  activation: swiglu     # <-- the only difference from A (gelu)
  pool: cls
  num_bins: 20
  max_position: 256

synthetic: false
pubchem_path: data/processed/pubchem.smi
pubchem_limit: 10000000
stage2_reactions_path: data/processed/reactions
tokenizer_path: data/processed/tokenizer.json

stage1_enabled: true
stage2_enabled: true
stage1_epochs: 10
stage2_epochs: 5
mlm_prob: 0.15
span_mask_stage2: true

seed: 0                  # matched to A so the probe delta isolates the FFN
batch_size: 256
lr: 3.0e-4
max_length: 256
device: cuda
amp: true
compile: true
num_workers: 8
out_dir: runs/pretrain_b
