# Pretraining run B — full corpus, seed 1.
# Identical to pretrain_a.yaml except `seed` and `out_dir` (fickleness rerun).
# If you'd rather make B an algorithm variant, change ONE model knob here
# (truncated_bptt_k or activation) and leave the rest matched to A.
name: pretrain_b

model:
  d_model: 384
  n_heads: 6
  d_ff: 1536
  prelude_layers: 2
  core_layers: 4
  recurrent: true
  train_r: 4
  randomize_r: true
  r_min: 1
  r_max: 8
  truncated_bptt_k: 4
  activation: gelu
  pool: cls
  num_bins: 20
  max_position: 256

synthetic: false
pubchem_path: data/processed/pubchem.smi
pubchem_limit: 10000000
stage2_reactions_path: data/processed/reactions
tokenizer_path: data/processed/tokenizer.json

stage1_enabled: true
stage2_enabled: true
stage1_epochs: 10
stage2_epochs: 5
mlm_prob: 0.15
span_mask_stage2: true

seed: 1
batch_size: 256
lr: 3.0e-4
max_length: 256
device: cuda
amp: true
compile: true
num_workers: 8
out_dir: runs/pretrain_b
